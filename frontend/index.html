<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link id="favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%23555'/></svg>">
  <title>Sense Platform</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5/500.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: 'Outfit', sans-serif; }

    /* Scene container */
    .scene {
      width: 100%; flex: 1;
      position: relative; overflow: hidden;
      background: #0b0908;
    }

    /* Sky gradient — transitions on AQI change */
    .sky {
      position: absolute; inset: 0;
      transition: background 2.8s cubic-bezier(.4,0,.2,1);
      background: linear-gradient(180deg,#0d3d6e 0%,#1a6bb8 32%,#3a9ad4 66%,#68bce6 88%,#90d4f0 100%);
    }

    /* Particle canvas */
    .particle-canvas {
      position: absolute; inset: 0;
      display: block; pointer-events: none; z-index: 4;
    }

    /* Skyline SVG */
    .skyline {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 260px;
      z-index: 2; pointer-events: none;
    }

    /* Text shadow for legibility against any sky */
    .text-glow {
      text-shadow: 0 1px 8px rgba(0,0,0,.35), 0 0 2px rgba(0,0,0,.2);
    }

    /* Top bar */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 18px 24px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10; pointer-events: none;
    }
    .top-bar-label {
      font-size: 12px; letter-spacing: .22em;
      text-transform: uppercase; color: rgba(255,255,255,.5);
    }
    .top-bar-right {
      display: flex; align-items: center; gap: 8px;
    }
    .top-bar-clock {
      font-size: 13px; font-weight: 500; color: rgba(255,255,255,.45);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,.15);
    }

    /* Centre content — vertically centred above the skyline */
    .centre-block {
      position: absolute; top: 0; left: 0; right: 0;
      bottom: 35%; /* skyline occupies ~bottom 35% */
      padding: 0 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; z-index: 10; pointer-events: none;
    }
    .centre-label {
      font-size: 11px; letter-spacing: .3em;
      text-transform: uppercase; color: rgba(255,255,255,.4);
      margin-bottom: 2px;
    }
    .aqi-number {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 128px; font-weight: 400;
      line-height: 1; letter-spacing: -2px;
      color: rgba(255,255,255,.92); margin-bottom: 24px;
    }
    .aqi-category {
      font-size: 14px; letter-spacing: .24em;
      text-transform: uppercase; color: rgba(255,255,255,.6);
    }
    .location-row {
      display: flex; align-items: center; gap: 6px;
      justify-content: center; margin-top: 10px;
    }
    .location-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.3); flex-shrink: 0;
      transition: background 1.5s;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .location-label {
      font-size: 13px; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(255,255,255,.55);
    }

    /* Stats row */
    .stats-container {
      opacity: 0; transition: opacity .6s ease;
      margin-top: 20px; width: 100%;
    }
    .stats-divider {
      width: min(85%, 420px); border-top: 1px solid rgba(255,255,255,.15);
      margin: 0 auto 16px;
    }
    .stats-row {
      display: flex; flex-wrap: nowrap; gap: 0;
      justify-content: center; align-items: flex-end;
    }
    .stat-item {
      text-align: center; flex: 1;
      min-width: 0; max-width: 72px;
    }
    .stat-value {
      font-size: 20px; font-weight: 500;
      color: rgba(255,255,255,.9); line-height: 1;
    }
    .stat-label {
      font-size: 9px; letter-spacing: .06em;
      text-transform: uppercase; color: rgba(255,255,255,.45);
      margin-top: 6px;
    }

    /* Ask bar */
    .ask-bar {
      position: absolute; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 20; width: min(90%, 480px);
      pointer-events: auto;
    }
    .ask-input-row {
      display: flex; gap: 8px; align-items: center;
    }
    .ask-input {
      flex: 1; padding: 10px 16px;
      border-radius: 24px; border: 1px solid rgba(255,255,255,.2);
      background: rgba(0,0,0,.35); color: rgba(255,255,255,.9);
      font-size: 16px; font-family: 'Outfit', sans-serif;
      outline: none; backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .ask-input::placeholder { color: rgba(255,255,255,.35); }
    .ask-input:focus { border-color: rgba(255,255,255,.4); }
    .ask-btn {
      padding: 10px 18px; border-radius: 24px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1); color: rgba(255,255,255,.8);
      font-size: 13px; font-family: 'Outfit', sans-serif;
      cursor: pointer; white-space: nowrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .ask-btn:hover { background: rgba(255,255,255,.18); }
    .ask-btn:disabled { opacity: .4; cursor: default; }
    .ask-response {
      margin-bottom: 10px; padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.6); color: rgba(255,255,255,.9);
      font-size: 13px; line-height: 1.6;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      max-height: 180px; overflow-y: auto;
      display: none;
    }
    .ask-response.visible { display: block; }

    /* Mobile */
    @media (max-width: 480px) {
      .top-bar { padding: 14px 16px; }
      .top-bar-label { font-size: 10px; }
      .top-bar-clock { font-size: 11px; }
      .aqi-number { font-size: 96px; padding-bottom: 28px; }
      .aqi-category { font-size: 12px; }
      .location-label { font-size: 11px; }
      .stats-container { margin-top: 16px; }
      .stat-value { font-size: 17px; }
      .stat-item { max-width: 60px; }
    }

  </style>
</head>
<body>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const CONFIG = {
  SITE_NAME: (window.SENSE_CONFIG && window.SENSE_CONFIG.SITE_NAME) || 'Sense Platform',
  API_BASE: (window.SENSE_CONFIG && window.SENSE_CONFIG.API_BASE_URL) || '',
  CLAUDE_URL: (window.SENSE_CONFIG && window.SENSE_CONFIG.CLAUDE_FUNCTION_URL) || '',
  POLL_INTERVAL: 5000,
};

// Stat severity colours — white when normal, shifts warm as it worsens
const SEV_COLORS = [
  'rgba(255,255,255,.88)',  // good — default white
  'rgba(255,224,138,.92)',  // moderate — warm yellow
  'rgba(255,179,71,.92)',   // elevated — orange
  'rgba(255,127,80,.92)',   // high — coral
  'rgba(255,85,85,.92)',    // severe — red
];

// Thresholds per stat — array of breakpoints mapping to SEV_COLORS index
// Each entry: [threshold, severity_index]. Value >= threshold gets that colour.
const STAT_THRESHOLDS = {
  pm25:     [[0, 0], [12, 1], [35.5, 2], [55.5, 3], [150.5, 4]],
  pm10:     [[0, 0], [55, 1], [155, 2], [255, 3], [355, 4]],
  co2:      [[0, 0], [800, 1], [1000, 2], [1500, 3], [2000, 4]],
  voc:      [[0, 0], [150, 1], [250, 2], [350, 3], [450, 4]],
  nox:      [[0, 0], [20, 1], [50, 2], [150, 3], [300, 4]],
};

function statColor(id, value) {
  const thresholds = STAT_THRESHOLDS[id];
  if (!thresholds) return SEV_COLORS[0];
  let color = SEV_COLORS[0];
  for (const [thresh, sev] of thresholds) {
    if (value >= thresh) color = SEV_COLORS[sev];
  }
  return color;
}

// Stats to display — order matches the row
const STAT_FIELDS = [
  { id: 'pm25',     label: 'PM2.5',    format: v => Math.round(v) },
  { id: 'co2',      label: 'CO2',      format: v => Math.round(v) },
  { id: 'voc',      label: 'VOC',      format: v => Math.round(v) },
  { id: 'nox',      label: 'NOx',      format: v => Math.round(v) },
  { id: 'temp',     label: 'Temp',     format: v => Math.round(v) + '\u00b0' },
  { id: 'humidity', label: 'Humidity', format: v => Math.round(v) + '%' },
];

// ═══════════════════════════════════════════
// AQI STATE DEFINITIONS
// ═══════════════════════════════════════════
const AQI_STATES = [
  { min: 0,   max: 50,  key: 'good',      label: 'Good',                          dot: '#7ee8a2', sky: 'linear-gradient(180deg,#0d3d6e 0%,#1a6bb8 32%,#3a9ad4 66%,#68bce6 88%,#90d4f0 100%)', specks: { n: [10, 30],   r: [1.0, 1.2],  al: [0.55, 0.65] }, blobs: { n: [1, 3],    r: [10, 16], al: [0.008, 0.018] } },
  { min: 51,  max: 100, key: 'moderate',  label: 'Moderate',                      dot: '#ffe08a', sky: 'linear-gradient(180deg,#1e3a52 0%,#3a6284 32%,#6894b0 66%,#9cc2d4 88%,#bddce6 100%)', specks: { n: [30, 70],    r: [1.2, 1.5],  al: [0.65, 0.72] }, blobs: { n: [3, 8],    r: [16, 22], al: [0.018, 0.030] } },
  { min: 101, max: 150, key: 'sensitive', label: 'Unhealthy for Sensitive Groups', dot: '#ffb347', sky: 'linear-gradient(180deg,#2c1c06 0%,#785010 32%,#ba8828 66%,#d8b050 88%,#e8cc72 100%)', specks: { n: [70, 120],   r: [1.5, 1.8],  al: [0.72, 0.78] }, blobs: { n: [8, 15],   r: [22, 28], al: [0.030, 0.042] } },
  { min: 151, max: 200, key: 'unhealthy', label: 'Unhealthy',                     dot: '#ff7f50', sky: 'linear-gradient(180deg,#1c0804 0%,#782c08 32%,#b65020 66%,#d67840 88%,#e8a262 100%)', specks: { n: [120, 160],  r: [1.8, 2.2],  al: [0.78, 0.82] }, blobs: { n: [15, 22],  r: [28, 34], al: [0.042, 0.052] } },
  { min: 201, max: 300, key: 'vuhealthy', label: 'Very Unhealthy',                dot: '#c77dff', sky: 'linear-gradient(180deg,#0e0620 0%,#3c1866 32%,#6e40a0 66%,#9468be 88%,#b490d6 100%)', specks: { n: [160, 190],  r: [2.2, 2.6],  al: [0.82, 0.85] }, blobs: { n: [22, 28],  r: [34, 40], al: [0.052, 0.062] } },
  { min: 301, max: 500, key: 'hazardous', label: 'Hazardous',                     dot: '#ff5555', sky: 'linear-gradient(180deg,#080204 0%,#3c0808 32%,#7e2018 66%,#ae4030 88%,#c86252 100%)', specks: { n: [190, 200],  r: [2.6, 3.0],  al: [0.85, 0.88] }, blobs: { n: [28, 30],  r: [40, 48], al: [0.062, 0.072] } },
];

function lerp(a, b, t) { return a + (b - a) * t; }

function aqiState(aqi) {
  const tier = AQI_STATES.find(s => aqi <= s.max) || AQI_STATES[AQI_STATES.length - 1];
  const t = Math.min(1, Math.max(0, (aqi - tier.min) / (tier.max - tier.min)));
  return {
    key: tier.key, label: tier.label, dot: tier.dot, sky: tier.sky,
    specks: {
      n:  Math.round(lerp(tier.specks.n[0],  tier.specks.n[1],  t)),
      r:  lerp(tier.specks.r[0],  tier.specks.r[1],  t),
      al: lerp(tier.specks.al[0], tier.specks.al[1], t),
    },
    blobs: {
      n:  Math.round(lerp(tier.blobs.n[0],  tier.blobs.n[1],  t)),
      r:  lerp(tier.blobs.r[0],  tier.blobs.r[1],  t),
      al: lerp(tier.blobs.al[0], tier.blobs.al[1], t),
    },
  };
}

// Demo data for preview buttons
const DEMO = {
  good:      { aqi: 23,  pm25: 4.2,   pm10: 8.1,   co2: 412, temp: 26.4, humidity: 58, voc: 82,  nox: 8,  co2_status: 'Good' },
  moderate:  { aqi: 76,  pm25: 15.8,  pm10: 28.4,  co2: 445, temp: 28.1, humidity: 62, voc: 124, nox: 15, co2_status: 'Good' },
  sensitive: { aqi: 128, pm25: 46.2,  pm10: 72.1,  co2: 868, temp: 30.2, humidity: 45, voc: 186, nox: 28, co2_status: 'Acceptable' },
  unhealthy: { aqi: 165, pm25: 68.4,  pm10: 95.2,  co2: 1120, temp: 31.8, humidity: 38, voc: 245, nox: 42, co2_status: 'Poor' },
  vuhealthy: { aqi: 248, pm25: 148.2, pm10: 198.5, co2: 1680, temp: 29.4, humidity: 42, voc: 352, nox: 65, co2_status: 'Very Poor' },
  hazardous: { aqi: 342, pm25: 245.8, pm10: 312.4, co2: 2450, temp: 28.9, humidity: 35, voc: 498, nox: 95, co2_status: 'Dangerous' },
};

// ═══════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const skyEl     = $('sky');
const anumEl    = $('anum');
const acatEl    = $('acat');
const ldotEl    = $('ldot');
const statsEl   = $('stats');
const statusDot = $('status-dot');
const canvas    = $('pc');
const ctx       = canvas.getContext('2d');

// ═══════════════════════════════════════════
// BUILD STAT ELEMENTS
// ═══════════════════════════════════════════
const statEls = {};
const statsRow = $('stats-row');
STAT_FIELDS.forEach(f => {
  const item = document.createElement('div');
  item.className = 'stat-item';
  const val = document.createElement('div');
  val.className = 'stat-value';
  val.textContent = '\u2013';
  const lbl = document.createElement('div');
  lbl.className = 'stat-label';
  lbl.textContent = f.label;
  item.appendChild(val);
  item.appendChild(lbl);
  statsRow.appendChild(item);
  statEls[f.id] = val;
});

// ═══════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════
let W = 800, H = 580;
let specks = [], blobs = [];
let curState = aqiState(23);

// Skyline CSS is 260px, foreground rooftop peaks at ~60px from bottom of scene.
// Particles base starts at rooftops, spreading upward.
function roofTop() { return H - 60; }
function spreadH() { return Math.min(300, H * 0.4); }

function mkSpeck() {
  const base = roofTop(), spread = spreadH(), u = Math.random();
  return {
    x: Math.random() * W, y: base - Math.pow(u, 1.6) * spread,
    vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .06,
    phase: Math.random() * Math.PI * 2, spd: .003 + Math.random() * .007,
  };
}

function mkBlob() {
  const base = roofTop(), spread = spreadH(), u = Math.random();
  return {
    x: Math.random() * W, y: base - 10 - Math.pow(u, 1.2) * spread * 0.85,
    vx: (Math.random() - .5) * .15, vy: (Math.random() - .5) * .035,
    phase: Math.random() * Math.PI * 2, spd: .0015 + Math.random() * .003,
  };
}

function initCanvas() {
  const el = $('sc');
  W = el.offsetWidth || 800;
  H = el.offsetHeight || 580;
  canvas.width = W;
  canvas.height = H;
  specks = Array.from({ length: 200 }, mkSpeck);
  blobs = Array.from({ length: 30 }, mkBlob);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const st = curState;
  const base = roofTop();
  const spread = spreadH();
  const ceiling = base - spread;

  // Haze layer — gradient fog rising from skyline
  if (st.blobs.n > 0) {
    const hazeGrad = ctx.createLinearGradient(0, H, 0, 0);
    const hazeAlpha = Math.min(st.blobs.al * 3.5, 0.22);
    hazeGrad.addColorStop(0, 'rgba(255,255,255,' + hazeAlpha.toFixed(3) + ')');
    hazeGrad.addColorStop(0.15, 'rgba(255,255,255,' + (hazeAlpha * 0.8).toFixed(3) + ')');
    hazeGrad.addColorStop(0.4, 'rgba(255,255,255,' + (hazeAlpha * 0.35).toFixed(3) + ')');
    hazeGrad.addColorStop(0.65, 'rgba(255,255,255,' + (hazeAlpha * 0.1).toFixed(3) + ')');
    hazeGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(0, 0, W, H);
  }

  for (let i = 0; i < st.blobs.n; i++) {
    const p = blobs[i];
    p.x += p.vx; p.y += p.vy; p.phase += p.spd;
    if (p.x < -st.blobs.r) p.x = W + st.blobs.r;
    if (p.x > W + st.blobs.r) p.x = -st.blobs.r;
    if (p.y > base + 4) { p.y = base + 4; p.vy = -Math.abs(p.vy) * .4; }
    if (p.y < ceiling) { p.y = ceiling; p.vy = Math.abs(p.vy) * .4; }
    const above = Math.max(0, base - p.y);
    const alpha = st.blobs.al * Math.exp(-above / (spread * 0.7)) * (.5 + .5 * Math.sin(p.phase));
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, st.blobs.r);
    grad.addColorStop(0, 'rgba(255,255,255,' + alpha.toFixed(4) + ')');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(p.x, p.y, st.blobs.r, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();
  }

  for (let i = 0; i < st.specks.n; i++) {
    const p = specks[i];
    p.x += p.vx; p.y += p.vy; p.phase += p.spd;
    if (p.x < -2) p.x = W + 2;
    if (p.x > W + 2) p.x = -2;
    if (p.y > base + 3) { p.y = base + 3; p.vy = -Math.abs(p.vy) * .5; }
    if (p.y < ceiling) { p.y = ceiling; p.vy = Math.abs(p.vy) * .5; }
    const above = Math.max(0, base - p.y);
    const alpha = st.specks.al * Math.exp(-above / (spread * 0.7)) * (.6 + .4 * Math.sin(p.phase));
    ctx.beginPath(); ctx.arc(p.x, p.y, st.specks.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, alpha).toFixed(3) + ')';
    ctx.fill();
  }

  setTimeout(() => requestAnimationFrame(draw), 50); // ~20fps, saves CPU
}

// ═══════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════
// Status dot — driven by how old the latest reading is (server timestamp)
let lastReceivedAt = null; // ISO string from API

function statusDotTick() {
  if (!lastReceivedAt) {
    statusDot.style.background = 'rgba(255,255,255,.15)';
  } else {
    const ageSec = (Date.now() - new Date(lastReceivedAt).getTime()) / 1000;
    const fadeDuration = 65; // fade over ~65s (device posts every 60s)

    if (ageSec < 3) {
      statusDot.style.background = '#7ee8a2';
    } else if (ageSec < fadeDuration) {
      const t = Math.min(1, (ageSec - 3) / fadeDuration);
      const r = Math.round(126 + (100 - 126) * t);
      const g = Math.round(232 + (100 - 232) * t);
      const b = Math.round(162 + (100 - 162) * t);
      const a = (0.88 - 0.68 * t).toFixed(2);
      statusDot.style.background = 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
    } else {
      statusDot.style.background = 'rgba(100,100,100,.2)';
    }
  }
  requestAnimationFrame(statusDotTick);
}
requestAnimationFrame(statusDotTick);

function setFavicon(color) {
  $('favicon').href = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='" + encodeURIComponent(color) + "'/></svg>";
}

function applyData(data) {
  const st = aqiState(data.aqi);
  curState = st;

  skyEl.style.background = st.sky;
  setFavicon(st.dot);
  anumEl.textContent = data.aqi;
  acatEl.textContent = st.label;
  ldotEl.style.background = st.dot;

  if (data.location) {
    $('location').textContent = data.location;
    $('loc-row').style.opacity = '1';
  }

  STAT_FIELDS.forEach(f => {
    const val = data[f.id] ?? 0;
    statEls[f.id].textContent = f.format(val);
    statEls[f.id].style.color = statColor(f.id, val);
    statEls[f.id].style.transition = 'color 1.5s ease';
  });

  statsEl.style.opacity = '1';
}

let liveData = null;

// ═══════════════════════════════════════════
// API FETCH
// ═══════════════════════════════════════════
let lastFetchOk = null;
let failCount = 0;
let deviceUrl = null;

async function discoverDevice() {
  if (!CONFIG.API_BASE) return null;
  try {
    const res = await fetch(CONFIG.API_BASE + 'devices', { headers: { 'Accept': 'application/json' } });
    if (!res.ok) return null;
    const devices = await res.json();
    if (devices.length > 0) return CONFIG.API_BASE + 'devices/' + devices[0].device_id + '/latest';
  } catch (e) { console.warn('Device discovery failed:', e); }
  return null;
}

async function fetchLatest() {
  if (!CONFIG.API_BASE) {
    acatEl.textContent = '\u2013';
    acatEl.classList.remove('pulse');
    anumEl.textContent = '\u2013';
    statsEl.style.opacity = '0.4';
    return;
  }

  if (!deviceUrl) {
    deviceUrl = await discoverDevice();
    if (!deviceUrl) return;
  }

  try {
    const res = await fetch(deviceUrl, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();

    const d = json.data || json;
    const c = json.computed || {};
    liveData = {
      aqi:        c.aqi           ?? d.aqi           ?? 0,
      pm25:       d.pm2_5         ?? d.pm25           ?? 0,
      pm10:       d.pm10_0        ?? d.pm10           ?? 0,
      co2:        d.co2_ppm       ?? d.co2            ?? 0,
      temp:       d.temperature_c ?? d.temperature    ?? 0,
      humidity:   d.humidity_pct  ?? d.humidity        ?? 0,
      voc:        d.voc_index     ?? d.voc            ?? 0,
      nox:        d.nox_index     ?? d.nox            ?? 0,
      location:   json.location_label                ?? null,
    };

    lastReceivedAt = json.received_at || json.recorded_at || null;

    failCount = 0;
    lastFetchOk = true;
    acatEl.classList.remove('pulse');
    applyData(liveData);
    if (!autoSummaryDone) autoSummary();
  } catch (err) {
    console.warn('Fetch failed:', err);
    failCount++;
    lastFetchOk = false;

    if (!liveData) {
      acatEl.textContent = 'Connection failed';
      acatEl.classList.remove('pulse');
    } else if (failCount >= 3) {
      acatEl.textContent = 'Stale data';
      acatEl.classList.add('pulse');
      statsEl.style.opacity = '0.5';
    }
  }
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function tick() {
  $('ts').textContent = new Date().toLocaleTimeString('en-AU', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  }).toUpperCase() + ' AEST';
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
setTimeout(() => {
  document.title = CONFIG.SITE_NAME;
  $('site-name').textContent = CONFIG.SITE_NAME;

  initCanvas();
  tick();
  setInterval(tick, 1000);
  fetchLatest();
  setInterval(fetchLatest, CONFIG.POLL_INTERVAL);
  draw();
}, 100);

window.addEventListener('resize', initCanvas);

// ═══════════════════════════════════════════
// ASK
// ═══════════════════════════════════════════
let autoSummaryDone = false;

async function autoSummary() {
  if (autoSummaryDone || !CONFIG.CLAUDE_URL) return;
  autoSummaryDone = true;

  const askResponse = $('ask-response');
  askResponse.textContent = '...';
  askResponse.classList.add('visible');

  try {
    const res = await fetch(CONFIG.CLAUDE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'ask',
        question: 'Give a brief status of the air quality right now. If anything is elevated, say what. Note if anything is abnormal compared to recent readings. If multiple readings are elevated, consider what they might indicate together. State facts, not suggestions.',
      }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    askResponse.textContent = data.answer || '';
  } catch (err) {
    console.warn('Auto-summary failed:', err);
    askResponse.classList.remove('visible');
  }
}

const askInput = $('ask-input');
const askBtn = $('ask-btn');
const askResponse = $('ask-response');

async function askQuestion() {
  const question = askInput.value.trim();
  if (!question || !CONFIG.CLAUDE_URL) return;

  askBtn.disabled = true;
  askBtn.textContent = '...';
  askResponse.textContent = 'Thinking...';
  askResponse.classList.add('visible');

  try {
    const res = await fetch(CONFIG.CLAUDE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'ask', question }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    askResponse.textContent = data.answer || 'No response.';
  } catch (err) {
    console.error('Ask failed:', err);
    askResponse.textContent = 'Something went wrong. Try again.';
  }

  askBtn.disabled = false;
  askBtn.textContent = 'Ask';
}

askBtn.addEventListener('click', askQuestion);
askInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') askQuestion();
});
askInput.addEventListener('input', () => {
  if (askInput.value.trim() === '') {
    askResponse.classList.remove('visible');
    askResponse.innerHTML = '';
  }
});
</script>
